<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adrian Sousa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e8e8e8; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px 0; scroll-behavior: smooth; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .msg-user { display: flex; justify-content: flex-end; margin-bottom: 20px; }
    .msg-user .bubble { background: #1a1a1a; border: 1px solid #2a2a2a; color: #e8e8e8; padding: 12px 16px; border-radius: 18px 18px 4px 18px; max-width: 75%; font-size: 15px; line-height: 1.6; }
    .msg-adrian { display: flex; flex-direction: column; margin-bottom: 24px; }
    .msg-adrian .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: #4a9eff; margin-bottom: 8px; text-transform: uppercase; }
    .msg-adrian .bubble { background: transparent; color: #e8e8e8; font-size: 15px; line-height: 1.75; max-width: 720px; }
    .msg-adrian .bubble p { margin-bottom: 12px; }
    .msg-adrian .bubble p:last-child { margin-bottom: 0; }
    .typing-dot { display: inline-block; width: 6px; height: 6px; background: #4a9eff; border-radius: 50%; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }
    .cursor { display: inline-block; width: 2px; height: 16px; background: #4a9eff; margin-left: 2px; animation: cursor-blink 1s infinite; vertical-align: text-bottom; }
    @keyframes cursor-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    #jd-panel { background: #111; border: 1px solid #222; border-radius: 12px; margin: 0 20px 16px; overflow: hidden; transition: all 0.3s ease; }
    #jd-panel.hidden { display: none; }
    #jd-tabs { display: flex; border-bottom: 1px solid #222; }
    .jd-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; color: #666; background: transparent; border: none; cursor: pointer; transition: color 0.2s; }
    .jd-tab.active { color: #4a9eff; border-bottom: 2px solid #4a9eff; margin-bottom: -1px; }
    #jd-textarea { width: 100%; background: transparent; border: none; outline: none; color: #e8e8e8; font-size: 14px; font-family: 'Inter', sans-serif; padding: 14px; resize: none; height: 100px; }
    #jd-url-input { width: 100%; background: transparent; border: none; outline: none; color: #e8e8e8; font-size: 14px; font-family: 'Inter', sans-serif; padding: 14px; }
    #analyze-btn { margin: 0 14px 14px; background: #4a9eff18; border: 1px solid #4a9eff44; color: #4a9eff; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    #analyze-btn:hover { background: #4a9eff28; }
    #prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 16px; }
    .chip { background: #111; border: 1px solid #222; color: #aaa; padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .chip:hover { border-color: #4a9eff44; color: #e8e8e8; background: #4a9eff0a; }
    #input-area { display: flex; align-items: center; gap: 10px; padding: 16px 20px; border-top: 1px solid #161616; background: #0a0a0a; }
    #jd-toggle { background: transparent; border: 1px solid #222; color: #555; padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    #jd-toggle:hover { border-color: #4a9eff44; color: #4a9eff; }
    #user-input { flex: 1; background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px 16px; color: #e8e8e8; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    #user-input:focus { border-color: #4a9eff44; }
    #user-input::placeholder { color: #444; }
    #send-btn { background: #4a9eff; border: none; border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    #send-btn:hover { background: #6ab0ff; }
    #send-btn:disabled { background: #222; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }
    #footer { text-align: center; padding: 10px 20px 14px; border-top: 1px solid #111; }
    #footer a { color: #444; font-size: 12px; text-decoration: none; margin: 0 12px; transition: color 0.2s; }
    #footer a:hover { color: #4a9eff; }
    .header-block { padding: 28px 20px 20px; text-align: center; }
    .header-block h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #fff; }
    .header-block .tagline { font-size: 13px; color: #555; margin-top: 4px; font-style: italic; }
    @media (max-width: 600px) { .chip { font-size: 12px; padding: 7px 12px; } .msg-user .bubble, .msg-adrian .bubble { font-size: 14px; } }
  </style>
</head>
<body>

  <div class="header-block">
    <h1>Adrian Sousa</h1>
    <p class="tagline">I'm the person you call when it matters.</p>
  </div>

  <div id="chat-messages">
    <div class="msg-adrian" id="intro-msg">
      <span class="label">Adrian</span>
      <div class="bubble" id="intro-text"></div>
    </div>
  </div>

  <div id="prompt-chips">
    <button class="chip" onclick="sendChip(this)">Tell me about HyrLink and why you built it</button>
    <button class="chip" onclick="sendChip(this)">How did you handle escalations at Cohesity?</button>
    <button class="chip" onclick="sendChip(this)">What's your SRE and observability philosophy?</button>
    <button class="chip" onclick="sendChip(this)">What do you believe makes a great engineer?</button>
    <button class="chip" onclick="sendChip(this)">What kind of role are you looking for?</button>
  </div>

  <div id="jd-panel" class="hidden">
    <div id="jd-tabs">
      <button class="jd-tab active" id="tab-paste" onclick="switchTab('paste')">Paste Job Description</button>
      <button class="jd-tab" id="tab-url" onclick="switchTab('url')">From URL</button>
    </div>
    <div id="jd-paste-content">
      <textarea id="jd-textarea" placeholder="Paste the full job description here..."></textarea>
    </div>
    <div id="jd-url-content" style="display:none">
      <input id="jd-url-input" type="url" placeholder="https://jobs.example.com/posting/12345" />
    </div>
    <button id="analyze-btn" onclick="analyzeJD()">Analyze Fit</button>
  </div>

  <div id="input-area">
    <button id="jd-toggle" onclick="toggleJD()" title="Analyze a job description">&#128196; JD Fit</button>
    <input id="user-input" type="text" placeholder="Ask me anything..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

  <div id="footer">
    <a href="mailto:adrian.m.sousa@gmail.com">adrian.m.sousa@gmail.com</a>
    <a href="https://linkedin.com/in/adrianmsousa" target="_blank">LinkedIn</a>
  </div>

  <script src="/app.js"></script>

</body>
</html>
