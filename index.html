<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Adrian's Resume</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="chat-wrapper">
    <header class="chat-header">
      <div class="header-avatar">AS</div>
      <div class="header-info">
        <h1>Ask Adrian's Resume</h1>
        <p>AI-powered Q&amp;A &mdash; powered by Gemini 1.5 Flash</p>
      </div>
    </header>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="bubble">
          Hi! I'm an AI assistant trained on Adrian Sousa's resume. Ask me anything about his experience, skills, tools, or background.
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input
        type="text"
        id="userInput"
        placeholder="Ask a question about Adrian's resume..."
        autocomplete="off"
      />
      <button id="sendBtn">Send</button>
    </div>

    <footer class="chat-footer">
      <span>Adrian Sousa &mdash; Technology Generalist &amp; AI Builder</span>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
