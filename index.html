<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Professional Candidate Assistant</title>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 100%; font-family: 'Inter', sans-serif; background: #0b1628; background-image: radial-gradient(ellipse at 20% 50%, rgba(30,60,120,0.4) 0%, transparent 60%), radial-gradient(ellipse at 80% 10%, rgba(15,40,90,0.5) 0%, transparent 55%); color: #e8e8e8; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
    .header-block { padding: 24px 20px 16px; text-align: center; }
    .header-block h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; color: #fff; }
    .header-block .tagline { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 4px; font-style: italic; }
    #intake-panel { margin: 0 12px 10px; padding: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    #intake-panel h2 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 10px; }
    #intake-panel p { font-size: 12px; color: rgba(255,255,255,0.55); margin-bottom: 12px; }
    .intake-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .intake-field { display: flex; flex-direction: column; gap: 6px; }
    .intake-field.full { grid-column: 1 / -1; }
    .intake-field label { font-size: 12px; color: rgba(255,255,255,0.7); }
    .intake-field input, .intake-field textarea { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 10px; padding: 10px 12px; font-family: 'Inter', sans-serif; font-size: 14px; outline: none; }
    .intake-field textarea { resize: vertical; min-height: 96px; }
    .intake-field input:focus, .intake-field textarea:focus { border-color: rgba(201,168,76,0.55); }
    #intake-submit { margin-top: 12px; width: 100%; background: linear-gradient(135deg, #b8922a, #e8c84a, #b8922a); border: none; color: #0b1628; font-weight: 600; border-radius: 10px; padding: 10px 14px; cursor: pointer; }
    #intake-submit:hover { filter: brightness(1.06); }
    #intake-status { margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.7); min-height: 16px; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 20px 20px 12px; scroll-behavior: smooth; background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-bottom: none; margin: 0 12px; border-radius: 18px 18px 0 0; }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .msg-user { display: flex; justify-content: flex-end; margin-bottom: 14px; }
    .msg-user .bubble { background: rgba(255,255,255,0.14); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 11px 16px; border-radius: 20px 20px 4px 20px; max-width: 72%; font-size: 15px; line-height: 1.55; }
    .msg-assistant { display: flex; flex-direction: column; margin-bottom: 20px; }
    .msg-assistant .label { font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; background: linear-gradient(90deg, #c9a84c 0%, #f0d080 40%, #c9a84c 70%, #f5e4a0 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gold-shimmer 3s linear infinite; }
    @keyframes gold-shimmer { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
    .msg-assistant .bubble { background: transparent; color: rgba(255,255,255,0.88); font-size: 15px; line-height: 1.75; max-width: 720px; }
    .msg-assistant .bubble p { margin-bottom: 12px; }
    .msg-assistant .bubble p:last-child { margin-bottom: 0; }
    .typing-dot { display: inline-block; width: 7px; height: 7px; background: linear-gradient(135deg, #c9a84c, #f0d080); border-radius: 50%; animation: blink 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.25; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1.1); } }
    .cursor { display: inline-block; width: 2px; height: 16px; background: #c9a84c; margin-left: 2px; animation: cursor-blink 1s infinite; vertical-align: text-bottom; }
    @keyframes cursor-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    #jd-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; margin: 0 20px 10px; overflow: hidden; transition: all 0.3s ease; }
    #jd-panel.hidden { display: none; }
    #jd-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .jd-tab { flex: 1; padding: 10px; font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.4); background: transparent; border: none; cursor: pointer; transition: color 0.2s; }
    .jd-tab.active { color: #c9a84c; border-bottom: 2px solid #c9a84c; margin-bottom: -1px; }
    #jd-textarea { width: 100%; background: transparent; border: none; outline: none; color: rgba(255,255,255,0.85); font-size: 14px; font-family: 'Inter', sans-serif; padding: 14px; resize: none; height: 100px; }
    #jd-url-input { width: 100%; background: transparent; border: none; outline: none; color: rgba(255,255,255,0.85); font-size: 14px; font-family: 'Inter', sans-serif; padding: 14px; }
    #analyze-btn { margin: 0 14px 14px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.35); color: #c9a84c; padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    #analyze-btn:hover { background: rgba(201,168,76,0.2); border-color: rgba(201,168,76,0.6); }
    #prompt-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px 20px; margin: 0 12px; background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.08); border-right: 1px solid rgba(255,255,255,0.08); }
    .chip { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.14); color: rgba(255,255,255,0.65); padding: 7px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; white-space: normal; text-align: left; line-height: 1.4; }
    .chip:hover { border-color: rgba(201,168,76,0.5); color: #f0d080; background: rgba(201,168,76,0.08); }
    #input-area { display: flex; align-items: center; gap: 10px; padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); margin: 0 12px; background: rgba(255,255,255,0.06); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-top: none; border-radius: 0 0 18px 18px; }
    #jd-toggle { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.4); padding: 8px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    #jd-toggle:hover { border-color: rgba(201,168,76,0.4); color: #c9a84c; }
    #user-input { flex: 1; min-width: 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 22px; padding: 11px 16px; color: #fff; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    #user-input:focus { border-color: rgba(201,168,76,0.45); }
    #user-input::placeholder { color: rgba(255,255,255,0.3); }
    #send-btn { background: linear-gradient(135deg, #b8922a, #e8c84a, #b8922a); background-size: 200% auto; border: none; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; flex-shrink: 0; animation: gold-shimmer 3s linear infinite; }
    #send-btn:hover { transform: scale(1.06); box-shadow: 0 0 12px rgba(201,168,76,0.5); }
    #send-btn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; animation: none; }
    #send-btn svg { width: 18px; height: 18px; fill: #0b1628; }
    #footer { text-align: center; padding: 10px 20px calc(14px + env(safe-area-inset-bottom)); }
    #footer a { color: rgba(255,255,255,0.25); font-size: 12px; text-decoration: none; margin: 0 12px; transition: color 0.2s; }
    #footer a:hover { color: #c9a84c; }

    /* ===== Responsive breakpoints ===== */
    /* Small phones: tighten spacing, widen bubbles, shrink header */
    @media (max-width: 600px) {
      .header-block { padding: 16px 16px 10px; }
      .header-block h1 { font-size: 19px; }
      .header-block .tagline { font-size: 12px; }
      .intake-grid { grid-template-columns: 1fr; }
      .chip { font-size: 12px; padding: 6px 12px; }
      .msg-user .bubble { font-size: 14px; max-width: 88%; }
      .msg-assistant .bubble { font-size: 14px; }
      #intake-panel, #chat-messages, #prompt-chips, #input-area, #jd-panel { margin: 0 6px; }
      #jd-toggle { padding: 8px 10px; }
    }

    /* Tablets and small laptops: a little breathing room over the phone layout */
    @media (min-width: 601px) and (max-width: 899px) {
      .header-block h1 { font-size: 23px; }
    }

    /* Larger screens: cap line length and center the app instead of stretching edge-to-edge */
    @media (min-width: 900px) {
      .header-block, #intake-panel, #chat-messages, #prompt-chips, #jd-panel, #input-area, #footer {
        max-width: 760px;
        margin-left: auto;
        margin-right: auto;
        width: 100%;
      }
    }

    /* Touch devices: enlarge tap targets regardless of screen size */
    @media (pointer: coarse) {
      .chip { padding: 9px 16px; }
      #jd-toggle { padding: 10px 14px; }
      #send-btn { width: 44px; height: 44px; }
      .jd-tab { padding: 13px 10px; }
    }
  </style>
</head>
<body>
  <div class="header-block">
    <h1>Professional Candidate Assistant</h1>
    <p class="tagline">Interview-ready responses grounded in provided background context.</p>
  </div>
  <section id="intake-panel" aria-label="Candidate intake questionnaire">
    <h2>Candidate Intake Questionnaire</h2>
    <p>Please complete this before starting the conversation.</p>
    <form id="intake-form">
      <div class="intake-grid">
        <div class="intake-field">
          <label for="candidate-name">Name</label>
          <input id="candidate-name" name="name" type="text" required autocomplete="name" />
        </div>
        <div class="intake-field">
          <label for="candidate-email">Email</label>
          <input id="candidate-email" name="email" type="email" required autocomplete="email" />
        </div>
        <div class="intake-field">
          <label for="candidate-phone">Phone (optional)</label>
          <input id="candidate-phone" name="phone" type="tel" autocomplete="tel" />
        </div>
        <div class="intake-field full">
          <label for="candidate-resume">Resume</label>
          <textarea id="candidate-resume" name="resume" required placeholder="Paste your resume text here."></textarea>
        </div>
      </div>
      <button id="intake-submit" type="submit">Save And Start</button>
      <div id="intake-status" aria-live="polite"></div>
    </form>
  </section>
  <div id="chat-messages">
    <div class="msg-assistant" id="intro-msg">
      <span class="label">Assistant</span>
      <div class="bubble" id="intro-text"></div>
    </div>
  </div>
  <div id="prompt-chips">
    <button class="chip" onclick="sendChip(this)">{COOL_CAREER_STORY}</button>
    <button class="chip" onclick="sendChip(this)">{COOL_CAREER_STORY}</button>
    <button class="chip" onclick="sendChip(this)">{YOUR_OPINIONS_ON_XYZ_TECHNOLOGY}</button>
    <button class="chip" onclick="sendChip(this)">{WHAT_MAKES_YOU_A_GOOD_ENG/SALES/DEV/ETC}</button>
    <button class="chip" onclick="sendChip(this)">{WHAT_DO_YOU_WANT_TO_DO_NEXT}</button>
  </div>
  <div id="jd-panel" class="hidden">
    <div id="jd-tabs">
      <button class="jd-tab active" id="tab-paste" onclick="switchTab('paste')">Paste Job Description</button>
      <button class="jd-tab" id="tab-url" onclick="switchTab('url')">From URL</button>
    </div>
    <div id="jd-paste-content">
      <textarea id="jd-textarea" placeholder="Paste the full job description here..."></textarea>
    </div>
    <div id="jd-url-content" style="display:none">
      <input id="jd-url-input" type="url" placeholder="https://jobs.example.com/posting/12345" />
    </div>
    <button id="analyze-btn" onclick="analyzeJD()">Analyze Fit</button>
  </div>
  <div id="input-area">
    <button id="jd-toggle" onclick="toggleJD()">&#128196; JD Fit</button>
    <input id="user-input" type="text" placeholder="Ask me anything..." autocomplete="off" />
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
    </button>
  </div>
  <div id="footer">
    <a href="#" aria-disabled="true">No direct contact information published</a>
  </div>
</body>
  <script src="/me.js"></script>
</html>
